[project]
name = "chronon"
profile = "library-pragmatic"

[thresholds]
max_cycles = 0
max_new_f_dimensions = 0
max_coupling_score = 8.0
max_cross_module_edges = 80
min_test_coverage_line = 0.0

[constraints]
max_cc = 25
max_file_sloc = 450
max_file_loc = 700
max_fan_out = 15
no_god_files = true

[[boundaries]]
from = "chronon-core/**"
to = "chronon-scheduler/**"
reason = "Core must stay persistence/runtime-free"

